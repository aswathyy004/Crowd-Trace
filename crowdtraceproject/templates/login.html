<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>CROWD TRACE — Login</title>

  <link href="https://fonts.googleapis.com" rel="preconnect">
  <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Questrial&family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange:   #E8692A;
      --orange2:  #f07c3e;
      --navy:     #0f1e2e;
      --navy2:    #162840;
      --glass-bg: rgba(255,255,255,0.07);
      --glass-border: rgba(255,255,255,0.15);
      --text:     #e8edf2;
      --muted:    rgba(232,237,242,0.55);
    }
    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: var(--navy);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      display: flex;
      flex-direction: column;
    }



    /* ── CANVAS BACKGROUND ── */
    #bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* ── FLOATING FACE CARDS (decorative) ── */
    .face-cards {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }

    .face-card {
      position: absolute;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      animation: floatCard linear infinite;
      opacity: 0;
    }

    .face-card svg { display: block; }

    @keyframes floatCard {
      0%   { transform: translateY(110vh) rotate(var(--rot)); opacity: 0; }
      5%   { opacity: var(--op); }
      90%  { opacity: var(--op); }
      100% { transform: translateY(-30vh) rotate(var(--rot2)); opacity: 0; }
    }

    /* ── GLOW ORBS ── */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      pointer-events: none;
      z-index: 0;
      animation: orbPulse ease-in-out infinite alternate;
    }

    .orb1 {
      width: 480px; height: 480px;
      background: radial-gradient(circle, rgba(232,105,42,0.22), transparent 70%);
      top: -100px; left: -80px;
      animation-duration: 7s;
    }
    .orb2 {
      width: 560px; height: 560px;
      background: radial-gradient(circle, rgba(22,40,64,0.9), transparent 70%);
      bottom: -150px; right: -100px;
      animation-duration: 9s;
    }
    .orb3 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(232,105,42,0.12), transparent 70%);
      bottom: 20%; left: 15%;
      animation-duration: 11s;
    }

    @keyframes orbPulse {
      from { transform: scale(1) translate(0,0); }
      to   { transform: scale(1.15) translate(20px, -20px); }
    }

    /* ── SCANLINE OVERLAY ── */
    .scanlines {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 3px,
        rgba(0,0,0,0.03) 3px,
        rgba(0,0,0,0.03) 4px
      );
    }

    /* ── MAIN LAYOUT ── */
    .page-body {
      flex: 1;
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* ── GLASS CARD ── */
    .login-card {
      width: 100%;
      max-width: 420px;
      background: rgba(255,255,255,0.055);
      backdrop-filter: blur(28px) saturate(160%);
      -webkit-backdrop-filter: blur(28px) saturate(160%);
      border: 1px solid rgba(255,255,255,0.13);
      border-radius: 24px;
      padding: 42px 40px 36px;
      box-shadow:
        0 0 0 1px rgba(232,105,42,0.1),
        0 24px 80px rgba(0,0,0,0.55),
        inset 0 1px 0 rgba(255,255,255,0.12);
      animation: cardIn 0.7s cubic-bezier(0.16,1,0.3,1) both;
      position: relative;
      overflow: hidden;
    }

    /* top accent line */
    .login-card::before {
      content: '';
      position: absolute;
      top: 0; left: 10%; right: 10%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--orange), transparent);
      border-radius: 0 0 4px 4px;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(32px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Badge */
    .badge-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 22px;
      animation: fadeUp 0.6s 0.15s both;
    }
    .badge-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--orange), var(--orange2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(232,105,42,0.4);
      flex-shrink: 0;
    }
    .badge-icon svg { width: 20px; height: 20px; fill: #fff; }

    .badge-label { font-size: 0.72rem; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; }
    .badge-title { font-family: 'Bebas Neue', cursive; font-size: 1.1rem; letter-spacing: 2px; color: var(--text); line-height: 1; }

    /* Heading */
    .card-heading {
      margin-bottom: 28px;
      animation: fadeUp 0.6s 0.25s both;
    }
    .card-heading h2 {
      font-family: 'Bebas Neue', cursive;
      font-size: 2rem;
      letter-spacing: 2px;
      line-height: 1;
      color: #fff;
      margin-bottom: 4px;
    }
    .card-heading p {
      font-size: 0.82rem;
      color: var(--muted);
    }

    /* Role tabs */
    .role-tabs {
      display: flex;
      background: rgba(0,0,0,0.25);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 24px;
      animation: fadeUp 0.6s 0.3s both;
    }
    .role-tab {
      flex: 1;
      text-align: center;
      padding: 8px 0;
      border-radius: 7px;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      color: var(--muted);
      transition: all 0.25s;
      letter-spacing: 0.5px;
      user-select: none;
    }
    .role-tab.active {
      background: linear-gradient(135deg, var(--orange), var(--orange2));
      color: #fff;
      box-shadow: 0 4px 14px rgba(232,105,42,0.35);
    }

    /* Form */
    .form-group {
      margin-bottom: 16px;
      animation: fadeUp 0.6s both;
    }
    .form-group:nth-child(1) { animation-delay: 0.35s; }
    .form-group:nth-child(2) { animation-delay: 0.4s; }

    label {
      display: block;
      font-size: 0.75rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 7px;
    }

    .input-wrap {
      position: relative;
    }
    .input-wrap svg {
      position: absolute;
      left: 14px; top: 50%; transform: translateY(-50%);
      width: 16px; height: 16px;
      opacity: 0.45;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 12px 14px 12px 40px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.92rem;
      outline: none;
      transition: all 0.25s;
    }
    input::placeholder { color: rgba(255,255,255,0.25); }
    input:focus {
      background: rgba(255,255,255,0.1);
      border-color: var(--orange);
      box-shadow: 0 0 0 3px rgba(232,105,42,0.15);
    }
    input:focus + svg, .input-wrap:focus-within svg { opacity: 0.85; }

    /* Password toggle */
    .toggle-pw {
      position: absolute;
      right: 13px; top: 50%; transform: translateY(-50%);
      cursor: pointer;
      opacity: 0.4;
      transition: opacity 0.2s;
      background: none; border: none; padding: 0;
    }
    .toggle-pw:hover { opacity: 0.8; }

.toggle-pw svg {
  width: 17px;
  height: 17px;
  fill: var(--text);
  display: block;
  pointer-events: auto;
}

    /* Options row */
    .options-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 22px;
      animation: fadeUp 0.6s 0.45s both;
    }
    .remember {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 0.8rem;
      color: var(--muted);
      user-select: none;
    }
    .remember input { display: none; }
    .custom-check {
      width: 16px; height: 16px;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.05);
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .remember input:checked ~ .custom-check {
      background: var(--orange);
      border-color: var(--orange);
    }
    .custom-check svg { width: 10px; height: 10px; fill: #fff; opacity: 0; transition: opacity 0.2s; }
    .remember input:checked ~ .custom-check svg { opacity: 1; }

    .forgot { font-size: 0.8rem; color: var(--orange); text-decoration: none; transition: opacity 0.2s; }
    .forgot:hover { opacity: 0.75; }

    /* Submit */
    .btn-login {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, var(--orange) 0%, var(--orange2) 100%);
      border: none;
      border-radius: 11px;
      color: #fff;
      font-family: 'Bebas Neue', cursive;
      font-size: 1.05rem;
      letter-spacing: 2.5px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      box-shadow: 0 6px 24px rgba(232,105,42,0.35);
      transition: transform 0.15s, box-shadow 0.15s;
      animation: fadeUp 0.6s 0.5s both;
    }
    .btn-login::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.18), transparent);
      opacity: 0;
      transition: opacity 0.25s;
    }
    .btn-login:hover { transform: translateY(-2px); box-shadow: 0 10px 32px rgba(232,105,42,0.45); }
    .btn-login:hover::after { opacity: 1; }
    .btn-login:active { transform: translateY(0); }

    /* Ripple */
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      transform: scale(0);
      animation: rippleAnim 0.55s linear;
      pointer-events: none;
    }
    @keyframes rippleAnim {
      to { transform: scale(4); opacity: 0; }
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 18px 0;
      animation: fadeUp 0.6s 0.55s both;
    }
    .divider span { flex: 1; height: 1px; background: rgba(255,255,255,0.08); }
    .divider p { font-size: 0.72rem; color: var(--muted); white-space: nowrap; }

    /* Status */
    .status-row {
      display: flex;
      gap: 8px;
      animation: fadeUp 0.6s 0.6s both;
    }
    .status-pill {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 10px 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 9px;
      font-size: 0.75rem;
      color: var(--muted);
    }
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 6px rgba(74,222,128,0.7);
      animation: blink 2s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes blink {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.3; }
    }

    /* Error message */
    .error-msg {
      display: none;
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 9px;
      padding: 10px 14px;
      font-size: 0.8rem;
      color: #fca5a5;
      margin-bottom: 14px;
      gap: 8px;
      align-items: center;
    }
    .error-msg.show { display: flex; animation: shakeX 0.4s both; }
    @keyframes shakeX {
      0%,100% { transform: translateX(0); }
      20%,60% { transform: translateX(-6px); }
      40%,80% { transform: translateX(6px); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Decorative vertical text */
    .vert-text {
      position: fixed;
      left: 28px;
      bottom: 60px;
      font-family: 'Bebas Neue', cursive;
      font-size: 0.75rem;
      letter-spacing: 4px;
      color: rgba(255,255,255,0.08);
      writing-mode: vertical-rl;
      z-index: 5;
      user-select: none;
    }
    .vert-text2 {
      position: fixed;
      right: 28px;
      top: 120px;
      font-family: 'Bebas Neue', cursive;
      font-size: 0.75rem;
      letter-spacing: 4px;
      color: rgba(255,255,255,0.08);
      writing-mode: vertical-rl;
      z-index: 5;
      user-select: none;
    }

    /* Ticker bar at bottom */
    .ticker-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 50;
      background: rgba(232,105,42,0.1);
      border-top: 1px solid rgba(232,105,42,0.2);
      backdrop-filter: blur(10px);
      padding: 7px 0;
      overflow: hidden;
      flex-shrink: 0;
    }
    .ticker-inner {
      display: flex;
      white-space: nowrap;
      animation: ticker 28s linear infinite;
      font-size: 0.72rem;
      letter-spacing: 2px;
      color: rgba(232,105,42,0.7);
      text-transform: uppercase;
      font-family: 'DM Sans', sans-serif;
    }
    .ticker-inner span { margin-right: 80px; }
    @keyframes ticker {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }

    /* Responsive */
    @media (max-width: 480px) {
      .login-card { padding: 32px 24px 28px; }
      header { padding: 12px 20px; }
      .vert-text, .vert-text2 { display: none; }
    }
  </style>
</head>
<body>


  <!-- Background canvas (particle network) -->
  <canvas id="bg-canvas"></canvas>

  <!-- Glow orbs -->
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>

  <!-- Scanlines -->
  <div class="scanlines"></div>

  <!-- Floating silhouette cards -->
  <div class="face-cards" id="faceCards"></div>

  <!-- Decorative text -->
  <div class="vert-text">SECURE ACCESS · CROWD TRACE · 2025</div>
  <div class="vert-text2">MISSING PERSONS · LAW ENFORCEMENT</div>

  <!-- Main -->
  <main class="page-body">
    <div class="login-card">

      <!-- Badge -->
      <div class="badge-row">
        <div class="badge-icon">
          <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 4a3 3 0 110 6 3 3 0 010-6zm0 8c2.67 0 8 1.34 8 4v1H4v-1c0-2.66 5.33-4 8-4z"/></svg>
        </div>
        <div>
          <div class="badge-label">Secure Portal</div>
          <div class="badge-title">CROWD TRACE</div>
        </div>
      </div>

      <!-- Heading -->
      <div class="card-heading">
        <h2>SIGN IN</h2>
        <p>Authorized personnel only — Admin &amp; Police access</p>
      </div>

      <!-- {% if messages %} -->
      <div class="error-msg" id="errorMsg">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="#fca5a5"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
        <span id="errorText">Invalid username or password.</span>
      </div>
      <!-- {% endif %} -->

      <!-- Form -->
      <form method="POST" action="/login/" id="loginForm">
        <!-- {% csrf_token %} -->
        <input type="hidden" name="csrfmiddlewaretoken" value="{{ csrf_token }}">

        <div class="form-group">
          <label for="username">Username</label>
          <div class="input-wrap">
            <svg viewBox="0 0 24 24" fill="white"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
            <input type="text" id="username" name="u" placeholder="Enter your username" autocomplete="username" required>
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrap">
            <svg viewBox="0 0 24 24" fill="white"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
            <input type="password" id="password" name="p" placeholder="Enter your password" autocomplete="current-password" required>
            <button type="button" class="toggle-pw" id="togglePw" title="Show/hide password">
              <svg id="eyeIcon" viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
            </button>
          </div>
        </div>

        <div class="options-row">
          <label class="remember">
            <input type="checkbox" name="remember">
            <div class="custom-check">
              <svg viewBox="0 0 12 12"><path d="M2 6l3 3 5-5" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
            </div>
            Remember me
          </label>
          <a href="/forgot_password/" class="forgot">Forgot password?</a>
        </div>

        <button type="submit" class="btn-login" id="loginBtn">SIGN IN</button>
      </form>

      <div class="divider">
        <span></span>
        <p>System Status</p>
        <span></span>
      </div>

      <div class="status-row">
        <div class="status-pill">
          <div class="status-dot"></div>
          Portal Online
        </div>
        <div class="status-pill">
          <div class="status-dot"></div>
          Secure Connection
        </div>
      </div>

    </div>
  </main>

  <!-- Ticker -->
  <div class="ticker-bar">
    <div class="ticker-inner" id="ticker"></div>
  </div>

  <script>
    // ── TICKER ──
    const msg = "CROWD TRACE SECURE PORTAL · AUTHORIZED PERSONNEL ONLY · MISSING PERSONS DATABASE · LAW ENFORCEMENT ACCESS · REAL-TIME CASE TRACKING · ";
    const t = document.getElementById('ticker');
    t.innerHTML = `<span>${msg}</span><span>${msg}</span><span>${msg}</span><span>${msg}</span>`;

    // ── PARTICLE CANVAS ──
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let W, H, particles = [], mouse = { x: -999, y: -999 };

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    function rand(a, b) { return Math.random() * (b - a) + a; }

    for (let i = 0; i < 80; i++) {
      particles.push({
        x: rand(0, window.innerWidth),
        y: rand(0, window.innerHeight),
        vx: rand(-0.25, 0.25),
        vy: rand(-0.25, 0.25),
        r: rand(1, 2.5),
        alpha: rand(0.15, 0.55)
      });
    }

    function drawParticles() {
      ctx.clearRect(0, 0, W, H);
      // lines
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const dist = Math.sqrt(dx*dx + dy*dy);
          if (dist < 130) {
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.strokeStyle = `rgba(232,105,42,${0.07 * (1 - dist/130)})`;
            ctx.lineWidth = 0.8;
            ctx.stroke();
          }
        }
        // mouse attraction
        const mdx = particles[i].x - mouse.x;
        const mdy = particles[i].y - mouse.y;
        const md = Math.sqrt(mdx*mdx + mdy*mdy);
        if (md < 160) {
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(mouse.x, mouse.y);
          ctx.strokeStyle = `rgba(232,105,42,${0.18 * (1 - md/160)})`;
          ctx.lineWidth = 1;
          ctx.stroke();
        }
      }
      // dots
      particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(232,105,42,${p.alpha})`;
        ctx.fill();
        p.x += p.vx; p.y += p.vy;
        if (p.x < 0 || p.x > W) p.vx *= -1;
        if (p.y < 0 || p.y > H) p.vy *= -1;
      });
      requestAnimationFrame(drawParticles);
    }
    drawParticles();

    window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });

    // ── FLOATING FACE CARDS ──
    const container = document.getElementById('faceCards');
    const colors = ['#1a2f45','#162035','#0f2236','#1e2d3d'];

    function makeCard() {
      const card = document.createElement('div');
      card.className = 'face-card';
      const size = Math.random() * 60 + 60;
      const rot  = (Math.random() - 0.5) * 20;
      const rot2 = rot + (Math.random() - 0.5) * 10;
      const op   = Math.random() * 0.18 + 0.06;
      card.style.cssText = `
        width:${size}px; height:${size*1.25}px;
        left:${Math.random()*95}%;
        --rot:${rot}deg; --rot2:${rot2}deg; --op:${op};
        animation-duration:${Math.random()*20+18}s;
        animation-delay:${Math.random()*15}s;
        background:${colors[Math.floor(Math.random()*colors.length)]};
      `;
      // simple SVG silhouette
      card.innerHTML = `<svg viewBox="0 0 60 75" width="${size}" height="${size*1.25}">
        <rect width="60" height="75" fill="${colors[Math.floor(Math.random()*colors.length)]}"/>
        <circle cx="30" cy="22" r="12" fill="rgba(232,105,42,0.25)"/>
        <ellipse cx="30" cy="62" rx="18" ry="14" fill="rgba(232,105,42,0.18)"/>
        <text x="4" y="72" font-size="5" fill="rgba(255,255,255,0.15)" font-family="monospace">ID-${Math.floor(Math.random()*9000+1000)}</text>
      </svg>`;
      container.appendChild(card);
      setTimeout(() => card.remove(), 40000);
    }

    for (let i = 0; i < 8; i++) setTimeout(makeCard, i * 2200);
    setInterval(makeCard, 3000);

    // ── ROLE TABS ──
    document.querySelectorAll('.role-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
      });
    });

    // ── PASSWORD TOGGLE ──
    const pw = document.getElementById('password');
    const togglePw = document.getElementById('togglePw');
    togglePw.addEventListener('click', () => {
      const isText = pw.type === 'text';
      pw.type = isText ? 'password' : 'text';
      document.getElementById('eyeIcon').innerHTML = isText
        ? '<path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>'
        : '<path d="M11.83 9L15 12.16V12a3 3 0 01-3.17-3zM6.53 6.53L3 3 1.73 4.27l3 3C2.7 9 1.24 10.33 0 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l3.35 3.35L20 20.73 6.53 6.53zM11 15a3 3 0 01-3-3c0-.36.07-.7.18-1.02L11 14V15zM21 1.73L19.73.47 3.27 16.93 4.54 18.2A10.94 10.94 0 0011 20c5 0 9.27-3.11 11-7.5-1-2.53-2.81-4.65-5.07-5.97L21 1.73zM12 7a3 3 0 012.82 4.01l3.68 3.68C20.13 13.22 21.55 11.72 22 12c-1.73-4.39-6-7.5-11-7.5-.65 0-1.28.07-1.9.19L12 7z"/>';
    });

    // ── RIPPLE EFFECT ──
    document.getElementById('loginBtn').addEventListener('click', function(e) {
      const rect = this.getBoundingClientRect();
      const rip = document.createElement('span');
      rip.className = 'ripple';
      const size = Math.max(rect.width, rect.height);
      rip.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px`;
      this.appendChild(rip);
      setTimeout(() => rip.remove(), 600);
    });

    // ── SHOW DJANGO ERROR (simulate) ──
    // In Django, inject: if messages → set errorMsg visible
    // For demo: check URL param
    if (new URLSearchParams(location.search).get('err')) {
      const em = document.getElementById('errorMsg');
      em.classList.add('show');
    }

    // ── INPUT SHAKE ON EMPTY SUBMIT ──
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      const u = document.getElementById('username').value.trim();
      const p = document.getElementById('password').value.trim();
      if (!u || !p) {
        e.preventDefault();
        document.getElementById('errorText').textContent = 'Please fill in all fields.';
        document.getElementById('errorMsg').classList.add('show');
      }
    });
  </script>
</body>
</html>
