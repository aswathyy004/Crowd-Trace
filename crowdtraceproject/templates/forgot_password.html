<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CROWD TRACE - Forgot Password</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans&display=swap" rel="stylesheet">

<style>

body{
background:#0f1e2e;
font-family:'DM Sans',sans-serif;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
color:white;
}

.card{
width:420px;
background:rgba(255,255,255,0.05);
padding:40px;
border-radius:20px;
backdrop-filter:blur(20px);
box-shadow:0 20px 60px rgba(0,0,0,0.6);
}

h2{
text-align:center;
margin-bottom:25px;
letter-spacing:2px;
}

label{
font-size:13px;
opacity:0.8;
}

input{
width:100%;
padding:12px;
margin-top:6px;
margin-bottom:16px;
border-radius:8px;
border:1px solid rgba(255,255,255,0.15);
background:rgba(255,255,255,0.05);
color:white;
outline:none;
}

input:focus{
border-color:#E8692A;
}

button{
width:100%;
padding:12px;
border:none;
background:#E8692A;
border-radius:10px;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#f07c3e;
}

a{
display:block;
text-align:center;
margin-top:15px;
color:#E8692A;
text-decoration:none;
}

.msg{
background:rgba(255,0,0,0.2);
padding:10px;
margin-bottom:15px;
border-radius:6px;
}

</style>
</head>

<body>

<div class="card">

<h2>RESET PASSWORD</h2>

{% if messages %}
{% for message in messages %}
<div class="msg">{{ message }}</div>
{% endfor %}
{% endif %}

<form method="POST">

{% csrf_token %}

<label>Username</label>
<input type="text" name="username" required>

<label>Current Password</label>
<input type="password" name="current_password" required>

<label>New Password</label>
<input type="password" name="new_password" required>

<label>Confirm Password</label>
<input type="password" name="confirm_password" required>

<button type="submit">CHANGE PASSWORD</button>

</form>

<a href="/login/">Back to Login</a>

</div>

</body>
</html>
